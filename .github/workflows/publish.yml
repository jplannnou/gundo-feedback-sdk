name: Release & Publish

on:
  push:
    branches: [main]
    paths-ignore: ['*.md', 'CHANGELOG.md', '.gitignore']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight release

jobs:
  # ── semantic-release: version bump + GitHub Packages publish ──────────────
  release:
    uses: jplannnou/gundo-workflows/.github/workflows/reusable-publish-npm.yml@v1
    with:
      build-command: >
        git clone --depth 1 https://github.com/jplannnou/gundo-ui.git ../gundo-ui &&
        cd ../gundo-ui && pnpm install --no-frozen-lockfile && pnpm build && cd - &&
        pnpm install --no-frozen-lockfile && pnpm build
    secrets:
      GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

  # ── Propagate new version to all consumer repos (open PRs) ────────────────
  propagate:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: jplannnou/Gundo_Engine
            pkg_dir: frontend
          - repo: jplannnou/Gundo_Finance
            pkg_dir: frontend
          - repo: jplannnou/Gundo_Radar
            pkg_dir: client
          - repo: jplannnou/jp-assistant
            pkg_dir: frontend
          - repo: jplannnou/gundo-feedback
            pkg_dir: frontend
          - repo: jplannnou/gundo-vida
            pkg_dir: .
          - repo: Gundo-Health-and-Food/gundo-admin-fitness-ui
            pkg_dir: .
    env:
      VERSION: ${{ needs.release.outputs.new-version }}
      NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
    steps:
      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.GH_PACKAGES_TOKEN }}

      - uses: pnpm/action-setup@v5
        with:
          version: 10.30.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@jplannnou'

      - name: Configure git for private deps
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PACKAGES_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${{ secrets.GH_PACKAGES_TOKEN }}@github.com/".insteadOf "git+https://github.com/"

      - name: Check if feedback-sdk is used via npm (not file:)
        id: check
        run: |
          PKG="package.json"
          if [ "${{ matrix.pkg_dir }}" != "." ]; then PKG="${{ matrix.pkg_dir }}/package.json"; fi
          if ! grep -q 'feedback-sdk' "$PKG" 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  feedback-sdk not found in $PKG — skipping"
          elif grep 'feedback-sdk' "$PKG" | grep -q '"file:'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Uses file: protocol — pnpm install picks it up, no version bump needed"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone @gundo/ui if repo uses file: protocol for it
        if: steps.check.outputs.skip != 'true'
        run: |
          PKG="package.json"
          if [ "${{ matrix.pkg_dir }}" != "." ]; then PKG="${{ matrix.pkg_dir }}/package.json"; fi
          if grep -q '@gundo/ui\|@jplannnou/gundo-ui' "$PKG" && grep '@gundo/ui\|@jplannnou/gundo-ui' "$PKG" | grep -q '"file:'; then
            UI_PATH=$(grep -oP '"@gundo/ui"\s*:\s*"file:\K[^"]+|"@jplannnou/gundo-ui"\s*:\s*"file:\K[^"]+' "$PKG" | head -1)
            DIR=$(dirname "$PKG")
            RESOLVED=$(cd "$DIR" && realpath -m "$UI_PATH" 2>/dev/null || echo "$(dirname $(pwd))/${UI_PATH#../}")
            echo "📦 Cloning @gundo/ui to $RESOLVED"
            git clone --depth 1 https://github.com/jplannnou/gundo-ui.git "$RESOLVED"
            cd "$RESOLVED" && pnpm install --no-frozen-lockfile && pnpm build
          fi

      - name: Update feedback-sdk to v${{ env.VERSION }}
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ matrix.pkg_dir }}
        run: pnpm add "@gundo/feedback-sdk@npm:@jplannnou/feedback-sdk@^${VERSION}"

      - name: Check for changes
        if: steps.check.outputs.skip != 'true'
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ Already up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with version bump
        if: steps.check.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: |
          BRANCH="chore/update-feedback-sdk-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore: update @gundo/feedback-sdk to ^${VERSION} (auto-propagate)"
          git push -u origin "$BRANCH"
          gh pr create \
            --repo "${{ matrix.repo }}" \
            --title "chore: update @gundo/feedback-sdk to ^${VERSION}" \
            --body "Bumps \`@gundo/feedback-sdk\` to \`^${VERSION}\` with updated lockfile.

Triggered by [v${VERSION} release](https://github.com/jplannnou/gundo-feedback-sdk/releases/tag/v${VERSION}).

---
*Auto-generated by gundo-feedback-sdk publish workflow.*"
