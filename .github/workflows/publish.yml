name: Release & Publish

on:
  push:
    branches: [main]
    paths-ignore: ['*.md', 'CHANGELOG.md', '.gitignore']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.sr.outputs.new_release_version }}
      released: ${{ steps.sr.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@jplannnou'

      - name: Clone @gundo/ui (peer dependency build)
        run: |
          git clone --depth 1 https://github.com/jplannnou/gundo-ui.git ../gundo-ui
          cd ../gundo-ui && pnpm install --no-frozen-lockfile && pnpm build

      - name: Build SDK
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm install --no-frozen-lockfile && pnpm build

      - name: Install semantic-release plugins (isolated dir)
        run: |
          mkdir -p /tmp/sr
          cd /tmp/sr
          npm init -y
          npm install --save-exact \
            semantic-release@23 \
            @semantic-release/changelog@6 \
            @semantic-release/git@10 \
            @semantic-release/github@10 \
            @semantic-release/npm@12 \
            @semantic-release/commit-analyzer@13 \
            @semantic-release/release-notes-generator@14

      - name: Run semantic-release
        id: sr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: NODE_PATH=/tmp/sr/node_modules /tmp/sr/node_modules/.bin/semantic-release

  propagate:
    name: Propagate to consumers
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - repo: jplannnou/Gundo_Engine
            pkg_dir: frontend
          - repo: jplannnou/Gundo_Finance
            pkg_dir: frontend
          - repo: jplannnou/Gundo_Radar
            pkg_dir: client
          - repo: jplannnou/jp-assistant
            pkg_dir: frontend
          - repo: jplannnou/gundo-feedback
            pkg_dir: frontend
          - repo: jplannnou/gundo-vida
            pkg_dir: .
          - repo: Gundo-Health-and-Food/gundo-admin-fitness-ui
            pkg_dir: .
    env:
      VERSION: ${{ needs.release.outputs.new-version }}
      NODE_AUTH_TOKEN: ${{ secrets.SDK_PROPAGATE_TOKEN }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.SDK_PROPAGATE_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@jplannnou'

      - name: Configure git for private deps
        run: |
          git config --global url."https://x-access-token:${{ secrets.SDK_PROPAGATE_TOKEN }}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${{ secrets.SDK_PROPAGATE_TOKEN }}@github.com/".insteadOf "git+https://github.com/"

      - name: Check if feedback-sdk used via npm (skip file protocol)
        id: check
        run: |
          PKG="package.json"
          if [ "${{ matrix.pkg_dir }}" != "." ]; then PKG="${{ matrix.pkg_dir }}/package.json"; fi
          if ! grep -q 'feedback-sdk' "$PKG" 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif grep 'feedback-sdk' "$PKG" | grep -q '"file:'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone @gundo/ui if consumer uses file protocol
        if: steps.check.outputs.skip != 'true'
        run: |
          PKG="package.json"
          if [ "${{ matrix.pkg_dir }}" != "." ]; then PKG="${{ matrix.pkg_dir }}/package.json"; fi
          if grep -q '@gundo/ui\|@jplannnou/gundo-ui' "$PKG" && grep '@gundo/ui\|@jplannnou/gundo-ui' "$PKG" | grep -q '"file:'; then
            UI_PATH=$(grep -oP '"@gundo/ui"\s*:\s*"file:\K[^"]+|"@jplannnou/gundo-ui"\s*:\s*"file:\K[^"]+' "$PKG" | head -1)
            DIR=$(dirname "$PKG")
            RESOLVED=$(cd "$DIR" && realpath -m "$UI_PATH" 2>/dev/null || echo "$(dirname $(pwd))/${UI_PATH#../}")
            git clone --depth 1 https://github.com/jplannnou/gundo-ui.git "$RESOLVED"
            cd "$RESOLVED" && pnpm install --no-frozen-lockfile && pnpm build
          fi

      - name: Update feedback-sdk version
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ matrix.pkg_dir }}
        run: pnpm add "@gundo/feedback-sdk@npm:@jplannnou/feedback-sdk@^${VERSION}"

      - name: Check for changes
        if: steps.check.outputs.skip != 'true'
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR with version bump
        if: steps.check.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.SDK_PROPAGATE_TOKEN }}
        run: |
          BRANCH="chore/update-feedback-sdk-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore: update @gundo/feedback-sdk to ^${VERSION} (auto-propagate)"
          git push -u origin "$BRANCH"
          printf 'Bumps `@gundo/feedback-sdk` to `^%s`.\n\nTriggered by v%s release: https://github.com/jplannnou/gundo-feedback-sdk/releases/tag/v%s\n\nAuto-generated.' \
            "$VERSION" "$VERSION" "$VERSION" > /tmp/pr-body.txt
          gh pr create \
            --repo "${{ matrix.repo }}" \
            --title "chore: update @gundo/feedback-sdk to ^${VERSION}" \
            --body-file /tmp/pr-body.txt
