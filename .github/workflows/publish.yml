name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Clone and build @gundo/ui (peer dependency)
        run: |
          git clone --depth 1 https://github.com/jplannnou/gundo-ui.git ../gundo-ui
          cd ../gundo-ui && pnpm install --no-frozen-lockfile && pnpm build

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Extract version
        id: version
        run: echo "value=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Verify dist
        run: |
          echo "--- Checking required dist files ---"
          test -f dist/index.js   || (echo "ERROR: dist/index.js not found" && exit 1)
          test -f dist/index.d.ts || (echo "ERROR: dist/index.d.ts not found" && exit 1)
          echo "dist/index.js and dist/index.d.ts are present"

          echo "--- Checking CSS files are copied from src/ to dist/ ---"
          for src_css in $(find src -name "*.css"); do
            rel="${src_css#src/}"
            if [ ! -f "dist/$rel" ]; then
              echo "ERROR: dist/$rel is missing (expected from $src_css)"
              exit 1
            fi
            echo "OK: dist/$rel"
          done

          echo "--- dist/ contents ---"
          find dist -type f | sort

      - name: Publish
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Auto-propagate to all consumer repos ──────────────────────────
  propagate:
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # JP's repos (jplannnou org)
          - repo: jplannnou/Gundo_Engine
            pkg_dir: frontend
          - repo: jplannnou/Gundo_Finance
            pkg_dir: frontend
          - repo: jplannnou/Gundo_Radar
            pkg_dir: client
          - repo: jplannnou/jp-assistant
            pkg_dir: frontend
          - repo: jplannnou/gundo-feedback
            pkg_dir: frontend
          # Gundo org repos
          - repo: Gundo-Health-and-Food/gundo-website-ui
            pkg_dir: .
          - repo: Gundo-Health-and-Food/gundo-internal-dashboard-ui
            pkg_dir: .
    steps:
      - name: Update SDK in ${{ matrix.repo }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SDK_PROPAGATE_TOKEN }}
          script: |
            const version = '${{ needs.publish.outputs.version }}';
            const [owner, repo] = '${{ matrix.repo }}'.split('/');
            const pkgDir = '${{ matrix.pkg_dir }}';
            const branch = `chore/update-feedback-sdk-${version}`;
            const pkgPath = pkgDir === '.' ? 'package.json' : `${pkgDir}/package.json`;

            // 1. Get default branch
            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoData.default_branch;

            // 2. Get current package.json
            let fileData;
            try {
              fileData = await github.rest.repos.getContent({ owner, repo, path: pkgPath, ref: defaultBranch });
            } catch (e) {
              console.log(`⚠️ ${pkgPath} not found in ${owner}/${repo}, skipping`);
              return;
            }

            const content = Buffer.from(fileData.data.content, 'base64').toString();
            const pkg = JSON.parse(content);

            // 3. Check if SDK is a dependency
            const deps = pkg.dependencies || {};
            const sdkKey = Object.keys(deps).find(k => k.includes('feedback-sdk'));
            if (!sdkKey) {
              console.log(`⚠️ feedback-sdk not found in ${owner}/${repo} dependencies, skipping`);
              return;
            }

            // 4. Update specifier to ^newVersion
            const currentSpec = deps[sdkKey];
            // Handle both "npm:@jplannnou/feedback-sdk@^X.Y.Z" and "file:..." patterns
            if (currentSpec.startsWith('file:')) {
              console.log(`⚠️ ${owner}/${repo} uses file: protocol, skipping`);
              return;
            }
            const newSpec = `npm:@jplannnou/feedback-sdk@^${version}`;
            if (currentSpec === newSpec) {
              console.log(`✅ ${owner}/${repo} already on ^${version}`);
              return;
            }

            deps[sdkKey] = newSpec;
            const updatedContent = JSON.stringify(pkg, null, 2) + '\n';

            // 5. Create branch from default
            const { data: ref } = await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` });
            try {
              await github.rest.git.createRef({ owner, repo, ref: `refs/heads/${branch}`, sha: ref.object.sha });
            } catch (e) {
              console.log(`⚠️ Branch ${branch} already exists in ${owner}/${repo}, skipping`);
              return;
            }

            // 6. Update package.json on branch
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path: pkgPath, branch,
              message: `chore: update @gundo/feedback-sdk to ^${version}`,
              content: Buffer.from(updatedContent).toString('base64'),
              sha: fileData.data.sha,
            });

            // 7. Create PR
            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: `chore: update @gundo/feedback-sdk to ^${version}`,
              head: branch,
              base: defaultBranch,
              body: `## Auto-update\n\nBumps \`@gundo/feedback-sdk\` to \`^${version}\`.\n\nTriggered by [v${version} publish](https://github.com/jplannnou/gundo-feedback-sdk/releases/tag/v${version}).\n\n> Run \`pnpm install\` after merge to update lockfile.\n\n🤖 Generated automatically by SDK publish workflow`,
            });

            console.log(`✅ PR created: ${pr.html_url}`);
