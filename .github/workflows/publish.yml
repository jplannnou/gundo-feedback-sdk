name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Clone and build @gundo/ui (peer dependency)
        run: |
          git clone --depth 1 https://github.com/jplannnou/gundo-ui.git ../gundo-ui
          cd ../gundo-ui && pnpm install --no-frozen-lockfile && pnpm build

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify dist
        run: |
          echo "--- Checking required dist files ---"
          test -f dist/index.js   || (echo "ERROR: dist/index.js not found" && exit 1)
          test -f dist/index.d.ts || (echo "ERROR: dist/index.d.ts not found" && exit 1)
          echo "dist/index.js and dist/index.d.ts are present"

          echo "--- Checking CSS files are copied from src/ to dist/ ---"
          for src_css in $(find src -name "*.css"); do
            rel="${src_css#src/}"
            if [ ! -f "dist/$rel" ]; then
              echo "ERROR: dist/$rel is missing (expected from $src_css)"
              exit 1
            fi
            echo "OK: dist/$rel"
          done

          echo "--- dist/ contents ---"
          find dist -type f | sort

      - name: Publish
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
