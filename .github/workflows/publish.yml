name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: '10.30.1'

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          cache: 'pnpm'

      - name: Clone and build @gundo/ui (peer dependency)
        run: |
          git clone --depth 1 https://github.com/jplannnou/gundo-ui.git ../gundo-ui
          cd ../gundo-ui && pnpm install --no-frozen-lockfile && pnpm build

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Extract version
        id: version
        run: echo "value=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Verify dist
        run: |
          echo "--- Checking required dist files ---"
          test -f dist/index.js   || (echo "ERROR: dist/index.js not found" && exit 1)
          test -f dist/index.d.ts || (echo "ERROR: dist/index.d.ts not found" && exit 1)
          echo "dist/index.js and dist/index.d.ts are present"

          echo "--- Checking CSS files are copied from src/ to dist/ ---"
          for src_css in $(find src -name "*.css"); do
            rel="${src_css#src/}"
            if [ ! -f "dist/$rel" ]; then
              echo "ERROR: dist/$rel is missing (expected from $src_css)"
              exit 1
            fi
            echo "OK: dist/$rel"
          done

          echo "--- dist/ contents ---"
          find dist -type f | sort

      - name: Publish
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Auto-propagate to all consumer repos ──────────────────────────
  # Checks out each consumer, runs `pnpm add` to update package.json + lockfile,
  # then pushes directly (JP repos) or creates a PR (external repos).
  propagate:
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # JP's repos → push directo a main
          - repo: jplannnou/Gundo_Engine
            pkg_dir: frontend
            direct_push: true
          - repo: jplannnou/Gundo_Finance
            pkg_dir: frontend
            direct_push: true
          - repo: jplannnou/Gundo_Radar
            pkg_dir: client
            direct_push: true
          - repo: jplannnou/jp-assistant
            pkg_dir: frontend
            direct_push: true
          - repo: jplannnou/gundo-feedback
            pkg_dir: frontend
            direct_push: true
          # External repos → PR with lockfile
          - repo: Gundo-Health-and-Food/gundo-admin-fitness-ui
            pkg_dir: .
            direct_push: false
          - repo: Gundo-Health-and-Food/gundo-website-ui
            pkg_dir: .
            direct_push: false
          - repo: Gundo-Health-and-Food/gundo-internal-dashboard-ui
            pkg_dir: .
            direct_push: false
    env:
      VERSION: ${{ needs.publish.outputs.version }}
      NODE_AUTH_TOKEN: ${{ secrets.SDK_PROPAGATE_TOKEN }}
    steps:
      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.SDK_PROPAGATE_TOKEN }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: 'Check if SDK is used (skip file: protocol)'
        id: check
        run: |
          PKG="${{ matrix.pkg_dir }}/package.json"
          if [ "${{ matrix.pkg_dir }}" = "." ]; then PKG="package.json"; fi
          if ! grep -q 'feedback-sdk' "$PKG" 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ feedback-sdk not found in $PKG"
          elif grep -q '"file:' "$PKG" 2>/dev/null && grep -A1 'feedback-sdk' "$PKG" | grep -q 'file:'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Uses file: protocol, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update SDK to v${{ env.VERSION }}
        if: steps.check.outputs.skip != 'true'
        working-directory: ${{ matrix.pkg_dir }}
        run: pnpm add "@gundo/feedback-sdk@npm:@jplannnou/feedback-sdk@^${VERSION}"

      - name: Check for changes
        if: steps.check.outputs.skip != 'true'
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "✅ Already up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to main
        if: steps.changes.outputs.changed == 'true' && matrix.direct_push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml "${{ matrix.pkg_dir }}/package.json"
          git commit -m "chore: update feedback-sdk to v${VERSION} (auto-propagate)"
          git push

      - name: Create PR
        if: steps.changes.outputs.changed == 'true' && !matrix.direct_push
        env:
          GH_TOKEN: ${{ secrets.SDK_PROPAGATE_TOKEN }}
        run: |
          BRANCH="chore/update-feedback-sdk-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add pnpm-lock.yaml "${{ matrix.pkg_dir }}/package.json"
          git commit -m "chore: update feedback-sdk to v${VERSION}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: update @gundo/feedback-sdk to ^${VERSION}" \
            --body "Bumps feedback-sdk to ^${VERSION} with updated lockfile. Triggered by [v${VERSION} publish](https://github.com/jplannnou/gundo-feedback-sdk/releases/tag/v${VERSION})."
